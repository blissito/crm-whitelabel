# CRM CoreGrid — Fly.io (single machine + volumen SQLite).
# ⚠️ SQLite es single-writer: NUNCA escalar a >1 máquina (corrompe datos).
#    Mantener `fly scale count 1`.
app = "crm-coregrid"
primary_region = "dfw"

[build]

[env]
  DATABASE_URL = "file:/data/crm.db"
  PORT = "3000"
  NODE_ENV = "production"

[mounts]
  source = "crm_data"
  destination = "/data"

[deploy]
  # SQLite vive en el volumen, que NO está montado en la release VM efímera.
  # Por eso migramos/seedeamos en el arranque de la máquina real (ver Dockerfile
  # CMD), no aquí.
  strategy = "immediate"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
